id: chrome-observe-act
name: Observe page, then act
description: Opens a page, waits for content, clicks, and saves the text.
trigger: manual
active: false
defaultMode: review
keybind: null
keybindEnabled: true
script: |
  chrome.browse("https://example.com")
  retry 3, 800 {
    chrome.wait("h1", 10000)
    let heading = chrome.query("h1")
    if heading {
      log(heading)
      let link = chrome.query("a")
      if link {
        chrome.click("a")
        chrome.wait("https://www.iana.org", 15000)
        sleep(400)
        let text = chrome.pageText()
        mkdir("~/Documents/Emmi Clips")
        write("~/Documents/Emmi Clips/observe-act.txt", text)
        log("Saved ~/Documents/Emmi Clips/observe-act.txt")
      } else {
        fail("No link on example.com yet")
      }
    } else {
      fail("Heading not ready")
    }
  }
steps:
  - tool: chrome.browse
    with:
      url: "https://example.com"
  - tool: chrome.wait
    with:
      urlOrSelector: "h1"
      timeoutMs: "10000"
  - tool: chrome.query
    with:
      selector: "h1"
  - tool: chrome.click
    with:
      selector: "a"
  - tool: write
    with:
      path: "~/Documents/Emmi Clips/observe-act.txt"
      content: "$text"
  - tool: log
    with:
      message: "Observe → act clip saved"
      category: chrome
